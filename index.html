<!DOCTYPE html>
<html lang="en" data-theme="light" class="bg-[#F8FAFC]">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | SignIn</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Fonts -->
    <!-- Geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="bg-[#F8FAFC] flex min-h-screen items-center justify-center p-4">

    <!-- SignIn Section -->
    <section class="p-8 space-y-6 text-[#1F2937] rounded-lg bg-white shadow-xl w-full max-w-[520px]">
        <img class="mx-auto" src="./assets/github-logo.png" alt="">

        <div class="text-center">
            <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
            <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>

        <!-- Form -->
        <fieldset class="fieldset">
            <label class="label text-neutral text-sm font-medium">Username</label>
            <input id="input-name" type="text" class="input rounded-lg border border-[#E4E4E7] py-6 w-full"
                placeholder="Enter Username" />
            <p class="text-sm text-[#4A00FF]">Default: admin</p>

            <label class="label text-neutral text-sm font-medium mt-3">Password</label>
            <input id="input-password" type="text" class="input rounded-lg border border-[#E4E4E7] py-6 w-full"
                placeholder="Enter Password" />
            <p class="text-sm text-[#4A00FF]">Default: admin123</p>

            <button id="login-btn" class="btn bg-[#4A00FF] rounded-lg mt-4 py-6 text-base text-white">Sign
                In</button>

        </fieldset>

        <div class="flex justify-center items-center gap-2">
            <hr class="flex-2 text-[#E4E4E7]">
            <p class="flex-0">OR</p>
            <hr class="flex-2 text-[#E4E4E7]">
        </div>

        <div class="text-center">
            <p class="text-sm text-[#64748B] mb-2">Demo Credentials:</p>
            <div class="bg-[#F8FAFC] rounded-lg py-6">
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>
    </section>

    <script src="./script/login.js"></script>
</body>

</html>
